context:
  version: "0.2.0"
  python_min: "3.10"

recipe:
  name: conda-completion-split
  version: ${{ version }}

source:
  url: https://github.com/conda-incubator/conda-completion/archive/refs/tags/${{ version }}.tar.gz
  sha256: f0578cc3f82ab6bd648e473e48847acc4e6c80055d83cfc9ebd041678beb2431

build:
  number: 1

outputs:
  - package:
      name: conda-completer
      version: ${{ version }}
    build:
      number: 1
      python:
         version_independent: true
      script:
        env:
          CARGO_PROFILE_RELEASE_STRIP: symbols
          CARGO_PROFILE_RELEASE_LTO: fat
        content:
          - if: unix
            then:
              - ${{ PYTHON }} -m pip install packages/conda-completer -vv --no-deps --no-build-isolation
            else:
              - ${{ PYTHON }} -m pip install packages\conda-completer -vv --no-deps --no-build-isolation
    requirements:
      build:
        - maturin >=1.0,<2.0
        - ${{ compiler('rust') }}
        - ${{ stdlib('c') }}
        - if: build_platform != target_platform
          then:
            - python ${{ python_min }}.*
            - cross-python_${{ target_platform }}
      host:
        - python ${{ python_min }}.*
        - pip
        - maturin >=1.0,<2.0
      run:
        - python >=${{ python_min }}
    tests:
      - python:
          imports:
            - conda_completer
          pip_check: false
      - package_contents:
          files:
            - python-scripts/_conda_completer*

  - package:
      name: conda-completion
      version: ${{ version }}
    build:
      number: 1
      noarch: python
      script:
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ version }}
        content: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      build:
        - if: build_platform != target_platform
          then:
            - python ${{ python_min }}.*
            - cross-python_${{ target_platform }}
      host:
        - python ${{ python_min }}.*
        - pip
        - hatchling >=1.12.2
        - hatch-vcs >=0.2.0
      run:
        - python >=${{ python_min }}
        - conda >=25.1
        - conda-completer ==${{ version }}
        - platformdirs >=4.0
        - tomli >=2.0
        - tomli-w >=1.0
    tests:
      - python:
          imports:
            - conda_completion
            - conda_completion.plugin
          pip_check: false
          python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/conda-incubator/conda-completion
  repository: https://github.com/conda-incubator/conda-completion
  documentation: https://conda-incubator.github.io/conda-completion/
  license: BSD-3-Clause
  license_file: LICENSE
  summary: >
    Fast shell tab completion for conda and all its plugins.

extra:
  feedstock-name: conda-completion
  recipe-maintainers:
    - jezdez
